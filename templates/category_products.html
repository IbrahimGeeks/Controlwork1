<h2>Товары категории: {{ category.name }}</h2>
<ul>
    {% for product in products %}
        <li>{{ product.name }} — {{ product.price }} сом</li>
    {% empty %}
        <li>В этой категории пока нет товаров.</li>
    {% endfor %}
</ul>
<a href="{% url 'categories' %}">Назад ко всем категориям</a>
